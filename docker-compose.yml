services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atomi_growth
      POSTGRES_USER: atomi
      POSTGRES_PASSWORD: atomi
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
